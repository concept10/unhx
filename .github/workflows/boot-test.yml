# .github/workflows/boot-test.yml — UNHOX kernel boot & IPC milestone test
#
# Runs on every push to main / pull request against main:
#
#   boot-test-x86_64 — x86-64 build + QEMU smoke test (ubuntu-latest)
#   boot-test-aarch64 — AArch64 build + QEMU smoke test (ubuntu-latest,
#                       cross-compiled with clang, run under qemu-system-aarch64)
#
# Each job:
#   1. Installs the appropriate cross-compiler and QEMU
#   2. Builds the kernel with UNHOX_BOOT_TESTS=ON
#   3. Boots the kernel under QEMU
#   4. Captures serial output
#   5. Verifies the boot banner and IPC test results

name: Boot & IPC Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Limit GITHUB_TOKEN to the minimum permissions needed:
#   contents: read  — allows actions/checkout to clone the repo
permissions:
  contents: read

jobs:
  boot-test-x86_64:
    name: Boot Test (x86-64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            qemu-system-x86 \
            cmake \
            grub-pc-bin \
            xorriso \
            mtools

      - name: Configure CMake (cross-compile for x86-64)
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=x86_64-linux-gnu-gcc \
            -DCMAKE_ASM_COMPILER=x86_64-linux-gnu-gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUNHOX_BOOT_TESTS=ON

      - name: Build kernel
        run: cmake --build build --target unhx.elf

      - name: Verify kernel image exists
        run: |
          ls -la build/kernel/unhx.elf
          file build/kernel/unhx.elf

      - name: Boot kernel in QEMU and capture serial output
        run: |
          timeout 30 qemu-system-x86_64 \
            -machine q35 \
            -accel tcg \
            -cpu qemu64 \
            -m 256M \
            -kernel build/kernel/unhx.elf \
            -serial file:serial_output.txt \
            -display none \
            -no-reboot \
            -no-shutdown \
            || true

          echo "=== Serial Output ==="
          cat serial_output.txt
          echo "=== End Serial Output ==="

      - name: Verify boot banner
        run: |
          grep -q "kernel_main entered" serial_output.txt || \
            (echo "FAIL: boot banner not found" && exit 1)
          echo "PASS: kernel_main entered"

      - name: Verify IPC smoke test
        run: |
          grep -q "Phase 1 complete. Mach IPC operational" serial_output.txt || \
            (echo "FAIL: IPC smoke test did not pass" && exit 1)
          echo "PASS: IPC smoke test passed"

      - name: Verify IPC milestone test
        run: |
          grep -q "IPC milestone v0.2 PASSED" serial_output.txt || \
            (echo "FAIL: IPC milestone test did not pass" && exit 1)
          echo "PASS: IPC milestone test passed"

      - name: Verify bootstrap server
        run: |
          grep -q "bootstrap server ready" serial_output.txt || \
            (echo "FAIL: bootstrap server did not initialise" && exit 1)
          echo "PASS: bootstrap server ready"

      - name: Upload serial output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serial-output-x86_64
          path: serial_output.txt

  boot-test-aarch64:
    name: Boot Test (AArch64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang, lld, and QEMU (aarch64)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang \
            lld \
            qemu-system-aarch64 \
            cmake

      - name: Configure CMake (cross-compile for AArch64)
        run: |
          cmake -S . -B build-aarch64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-elf-clang.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUNHOX_BOOT_TESTS=ON

      - name: Build kernel
        run: cmake --build build-aarch64 --target unhx.elf

      - name: Verify kernel image exists
        run: |
          ls -la build-aarch64/kernel/unhx.elf
          file build-aarch64/kernel/unhx.elf

      - name: Boot kernel in QEMU (aarch64) and capture serial output
        run: |
          # -machine virt,virtualization=off  — start in EL1 (no hypervisor)
          # -cpu cortex-a57                   — ARMv8-A CPU
          # -serial file:                     — capture PL011 UART output
          timeout 30 qemu-system-aarch64 \
            -machine virt,virtualization=off \
            -cpu cortex-a57 \
            -accel tcg \
            -m 256M \
            -kernel build-aarch64/kernel/unhx.elf \
            -serial file:serial_output_aarch64.txt \
            -display none \
            -no-reboot \
            || true

          echo "=== AArch64 Serial Output ==="
          cat serial_output_aarch64.txt
          echo "=== End AArch64 Serial Output ==="

      - name: Verify boot banner
        run: |
          grep -q "kernel_main entered" serial_output_aarch64.txt || \
            (echo "FAIL: boot banner not found" && exit 1)
          echo "PASS: kernel_main entered"

      - name: Verify IPC smoke test
        run: |
          grep -q "Phase 1 complete. Mach IPC operational" serial_output_aarch64.txt || \
            (echo "FAIL: IPC smoke test did not pass" && exit 1)
          echo "PASS: IPC smoke test passed"

      - name: Verify IPC milestone test
        run: |
          grep -q "IPC milestone v0.2 PASSED" serial_output_aarch64.txt || \
            (echo "FAIL: IPC milestone test did not pass" && exit 1)
          echo "PASS: IPC milestone test passed"

      - name: Verify bootstrap server
        run: |
          grep -q "bootstrap server ready" serial_output_aarch64.txt || \
            (echo "FAIL: bootstrap server did not initialise" && exit 1)
          echo "PASS: bootstrap server ready"

      - name: Upload serial output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serial-output-aarch64
          path: serial_output_aarch64.txt
